name: Re-shard Database

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  reshard:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache Python packages
        id: cache-pip
        uses: actions/cache@v4
        with:
          path: ${{ env.pythonLocation }}/lib/python*/site-packages
          key: pip-${{ hashFiles('requirements.txt') }}

      - name: Install Python dependencies
        if: steps.cache-pip.outputs.cache-hit != 'true'
        run: pip install -r requirements.txt

      - name: Fetch encrypted database from data branch
        run: |
          mkdir -p data
          git fetch origin data --depth=1 2>/dev/null || echo "No data branch yet."
          if ! git rev-parse origin/data >/dev/null 2>&1; then
            echo "No data branch, nothing to re-shard."
            exit 0
          fi
          if git cat-file -e origin/data:data/icourse-index.enc 2>/dev/null; then
            mkdir -p data/remote_sharded/shards
            git show origin/data:data/icourse-index.enc > data/remote_sharded/icourse-index.enc
            shard_paths=$(git ls-tree -r --name-only origin/data | grep '^data/shards/' || true)
            for path in $shard_paths; do
              base=$(basename "$path")
              git show "origin/data:$path" > "data/remote_sharded/shards/$base"
            done
            echo "Loaded $(ls data/remote_sharded/shards 2>/dev/null | wc -l) shard(s)."
          else
            echo "Unsupported data format. Expected sharded layout."
            exit 1
          fi

      - name: Reassemble database
        env:
          STUID: ${{ secrets.STUID }}
          UISPSW: ${{ secrets.UISPSW }}
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: |
          python scripts/db_shard.py reassemble data/remote_sharded data/icourse.db
          echo "Reassembled into data/icourse.db ($(ls -lh data/icourse.db | awk '{print $5}'))"

      - name: Re-shard with activity-aware grouping
        env:
          STUID: ${{ secrets.STUID }}
          UISPSW: ${{ secrets.UISPSW }}
        run: |
          rm -rf data/reshard_out
          python scripts/reshard.py data/icourse.db data/reshard_out
          echo "---"
          ls -lh data/reshard_out/shards/

      - name: Deploy new shards to data branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ ! -d data/reshard_out ]; then
            echo "No reshard output, skipping."
            exit 0
          fi

          rm -rf /tmp/db_deploy
          mkdir -p /tmp/db_deploy/data/shards
          cp data/reshard_out/icourse-index.enc /tmp/db_deploy/data/
          cp data/reshard_out/shards/*.db.gz.enc /tmp/db_deploy/data/shards/
          cd /tmp/db_deploy

          git init -q
          git checkout -q -b data
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -q -m "chore: re-shard database (activity-aware grouping)"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          git push --force origin data
